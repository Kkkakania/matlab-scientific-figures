name: Figure quality

on:
  push:
  pull_request:

jobs:
  mfigci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install matlab-figure-ci
        run: |
          python -m pip install --upgrade pip
          pip install git+https://github.com/Kkkakania/matlab-figure-ci.git@v2.0.0

      - name: Run figure quality checks
        run: |
          mfigci check --config mfigci.yml --report mfigci-report.md

      - name: Upload mfigci report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mfigci-report
          path: mfigci-report.md
