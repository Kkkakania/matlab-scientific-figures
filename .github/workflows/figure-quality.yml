name: Figure quality

on:
  push:
  pull_request:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  mfigci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install matlab-figure-ci
        run: |
          python -m pip install --upgrade pip
          pip install git+https://github.com/Kkkakania/matlab-figure-ci.git@v2.5.0

      - name: Show effective mfigci policy
        run: |
          mfigci rules --config mfigci.yml

      - name: Run figure quality checks
        run: |
          mfigci check --config mfigci.yml --report mfigci-report.md

      - name: Upload mfigci report
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: mfigci-report
          path: mfigci-report.md
