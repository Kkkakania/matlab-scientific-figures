name: Issue triage checklist

on:
  issues:
    types: [opened]

permissions:
  contents: read
  issues: write

jobs:
  checklist:
    if: ${{ !github.event.issue.pull_request }}
    runs-on: ubuntu-latest
    steps:
      - name: Add maintainer triage checklist
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
          TRIAGE_MARKER: "<!-- matlab-figure-ecosystem-triage -->"
        run: |
          set -euo pipefail

          run_gh() {
            local output status attempt max_attempts=3
            for attempt in $(seq 1 "$max_attempts"); do
              if output="$(gh "$@" 2>&1)"; then
                printf '%s\n' "$output"
                return 0
              fi
              status=$?
              if [[ "$output" != *"EOF"* && "$output" != *"HTTP 5"* && "$output" != *"timeout"* ]] || [[ "$attempt" -ge "$max_attempts" ]]; then
                printf '%s\n' "$output" >&2
                return "$status"
              fi
              sleep "$attempt"
            done
          }

          existing_comments="$(run_gh issue view "$ISSUE_URL" --comments --json comments --jq '.comments[].body')"
          if grep -Fq "$TRIAGE_MARKER" <<<"$existing_comments"; then
            echo "Triage checklist already exists."
            exit 0
          fi

          cat > /tmp/triage-comment.md <<'COMMENT'
          <!-- matlab-figure-ecosystem-triage -->
          Thanks for opening this. I use the checklist below to keep the issue useful without exposing private data or turning one report into a broad claim.

          Maintainer triage:

          - [ ] Classify the track: `gallery`, `agent`, `ci`, or `ecosystem-docs`.
          - [ ] Set the evidence level: `none`, `single-report`, `reproducible`, or `ci-covered`.
          - [ ] Ask for a synthetic reproducer if the report depends on private data.
          - [ ] Link the closest template, command, workflow run, or documentation page.
          - [ ] Decide the next state: `Triaged`, `Awaiting feedback`, `Accepted`, or `Out of scope`.
          - [ ] If this affects a release, add the release target in the public roadmap notes.

          Project-board setup is tracked in Kkkakania/matlab-scientific-figures#31. Until the live board exists, this checklist and repository labels are the public fallback triage surface.
          COMMENT

          run_gh issue comment "$ISSUE_URL" --body-file /tmp/triage-comment.md
