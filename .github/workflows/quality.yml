name: Quality checks

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  repository-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Verify gallery outputs are present
        run: ./scripts/check_gallery_outputs.sh

      - name: Verify gallery metadata is consistent
        run: ./scripts/check_gallery_consistency.sh

      - name: Verify release metadata is consistent
        run: ./scripts/check_version_consistency.sh

      - name: Check citation metadata
        run: ./scripts/check_citation.sh

      - name: Check documentation links
        run: ./scripts/check_docs_links.sh

      - name: Check API reference coverage
        run: ./scripts/check_api_reference.sh

      - name: Check template manifest schema
        run: ./scripts/check_template_manifest_schema.sh

      - name: Check template reference table
        run: ./scripts/check_template_reference_table.sh

      - name: Check tag reference
        run: ./scripts/check_tag_reference.sh

      - name: Check tag gallery
        run: ./scripts/check_tag_gallery.sh

      - name: Check examples README table
        run: ./scripts/check_examples_readme_table.sh

      - name: Check MATLAB help text
        run: ./scripts/check_matlab_help.sh

      - name: Check README gallery preview
        run: ./scripts/check_readme_gallery.sh

      - name: Check toolbox independence
        run: ./scripts/check_toolbox_independence.sh

      - name: Check compatibility documentation
        run: ./scripts/check_compatibility_docs.sh

      - name: Check color accessibility audit
        run: ./scripts/check_color_accessibility_audit.sh

      - name: Check timeout helper
        run: ./scripts/check_timeout_helper.sh

      - name: Check forbidden public files
        run: ./scripts/check_forbidden_files.sh

      - name: Run privacy scan
        run: ./scripts/check_privacy.sh

      - name: Run provenance scan
        run: ./scripts/check_provenance.sh
