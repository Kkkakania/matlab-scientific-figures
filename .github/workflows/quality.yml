name: Quality checks

on:
  push:
  pull_request:

jobs:
  repository-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Verify gallery outputs are present
        run: ./scripts/check_gallery_outputs.sh

      - name: Verify gallery metadata is consistent
        run: ./scripts/check_gallery_consistency.sh

      - name: Check documentation links
        run: ./scripts/check_docs_links.sh

      - name: Check forbidden public files
        run: ./scripts/check_forbidden_files.sh

      - name: Run privacy scan
        run: ./scripts/check_privacy.sh

      - name: Run provenance scan
        run: ./scripts/check_provenance.sh
